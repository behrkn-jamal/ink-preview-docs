<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkPreview | Project Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --obsidian: #0A0A0A;
            --steel: #1C1C1E;
            --charcoal: #2C2C2E;
            --gold: #D4AF37;
            --silver: #C0C0C0;
            --white: #FFFFFF;
            --soft-grey: #A0A0A0;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--obsidian);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: var(--steel);
            border-right: 1px solid var(--charcoal);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid var(--charcoal);
        }
        .sidebar-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--gold);
            margin: 0;
        }
        .sidebar-header p {
            font-size: 12px;
            color: var(--soft-grey);
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }
        .doc-item {
            padding: 12px 20px;
            cursor: pointer;
            color: var(--soft-grey);
            font-size: 14px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
        }
        .doc-item:hover {
            background-color: var(--charcoal);
            color: var(--white);
        }
        .doc-item.active {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border-left: 3px solid var(--gold);
            font-weight: 600;
        }
        /* Content Area */
        .main-content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
            background-color: var(--obsidian);
            scroll-behavior: smooth;
        }
        #content {
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.7;
        }
        /* Markdown Styles */
        #content h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 36px; margin-bottom: 20px; }
        #content h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 24px; border-bottom: 1px solid var(--charcoal); padding-bottom: 10px; margin-top: 40px; }
        #content h3 { color: var(--silver); font-size: 20px; margin-top: 30px; }
        #content p { color: var(--soft-grey); font-size: 16px; }
        #content table { width: 100%; border-collapse: collapse; margin: 20px 0; background: var(--steel); }
        #content th, #content td { border: 1px solid var(--charcoal); padding: 12px; text-align: left; }
        #content th { background: var(--charcoal); color: var(--gold); }
        #content blockquote { border-left: 4px solid var(--gold); padding-left: 20px; color: var(--silver); font-style: italic; margin: 20px 0; }
        #content code { background: var(--charcoal); padding: 2px 6px; border-radius: 4px; color: var(--gold); font-family: monospace; }
        #content pre { background: var(--steel); padding: 20px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--charcoal); }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--soft-grey);
            text-align: center;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            stroke: var(--charcoal);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>InkPreview</h1>
            <p>Project Documentation</p>
        </div>
        <div class="doc-list" id="docList">
            <!-- Documents will be populated by JS -->
        </div>
    </div>
    <div class="main-content">
        <div id="content">
            <div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18s-3.332.477-4.5 1.253" />
                </svg>
                <p>Select a document from the sidebar to begin.</p>
            </div>
        </div>
    </div>

    <script>
        const docs = [
            { name: 'Design System', path: 'docs/design_system.md' },
            { name: 'Sitemap & User Flows', path: 'docs/sitemap.md' },
            { name: 'Tatship Analysis', path: 'docs/tatship_analysis.md' },
            { name: 'Implementation Plan', path: 'docs/implementation_plan.md' },
            { name: 'AR Visualization Report', path: 'docs/research/ar_visualization_report.md' },
            { name: 'Tier 3: AR Mesh Wrapping', path: 'docs/tier3_research.md' }
        ];
        ];

        const docList = document.getElementById('docList');
        const contentDiv = document.getElementById('content');

        async function loadDoc(path, element) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                contentDiv.innerHTML = marked.parse(text);
                
                // Update active state
                document.querySelectorAll('.doc-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');
            } catch (err) {
                contentDiv.innerHTML = `<div class="empty-state"><p>Error loading document: ${err.message}</p></div>`;
            }
        }

        docs.forEach(doc => {
            const div = document.createElement('div');
            div.className = 'doc-item';
            div.innerText = doc.name;
            div.onclick = () => loadDoc(doc.path, div);
            docList.appendChild(div);
        });
    </script>
</body>
</html>
